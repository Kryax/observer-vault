<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motif Library — Live Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --surface3: #222233;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #8888a0;
    --text-muted: #555568;
    --accent-d: #ff6b6b;
    --accent-i: #4ecdc4;
    --accent-r: #a78bfa;
    --tier0: #555568;
    --tier1: #6b8aff;
    --tier2: #fbbf24;
    --tier3: #f472b6;
    --complement: #4ecdc4;
    --tension: #ff6b6b;
    --composition: #a78bfa;
    --source-td: #ff9f43;
    --source-bu: #54a0ff;
    --source-tri: #7c3aed;
    --gap-critical: #ef4444;
    --gap-high: #f59e0b;
    --gap-medium: #6366f1;
    --gap-low: #374151;
    --gap-void: rgba(239, 68, 68, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    height: 52px;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .header .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: #22c55e;
    border-radius: 50%;
    margin-right: 8px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .stats-bar {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .stats-bar .sv { font-weight: 700; color: var(--text); font-size: 15px; margin-right: 3px; }

  /* ── CONTROLS ── */
  .controls {
    height: 44px;
    padding: 0 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .controls label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-right: 2px;
  }

  .btn-group { display: flex; gap: 1px; }

  .btn {
    padding: 4px 10px;
    font-size: 11px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.12s;
    font-family: inherit;
  }
  .btn:hover { border-color: var(--text-dim); color: var(--text); }
  .btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .gap-toggle {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }
  .gap-toggle input { accent-color: var(--gap-critical); }
  .gap-toggle.on { color: var(--gap-critical); font-weight: 600; }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    height: calc(100vh - 96px);
  }

  .main-panel { position: relative; overflow: hidden; }
  .side-panel {
    border-left: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* ── SIDE PANEL TABS ── */
  .side-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .side-tab {
    flex: 1;
    padding: 8px 0;
    text-align: center;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .side-tab:hover { color: var(--text); }
  .side-tab.active { color: var(--text); border-bottom-color: var(--text); }

  .side-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  /* ── DETAIL PANEL ── */
  .detail-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }

  .detail-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }

  .tag {
    padding: 2px 7px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
  }
  .tag.tier0 { background: var(--tier0); color: #fff; }
  .tag.tier1 { background: var(--tier1); color: #fff; }
  .tag.tier2 { background: var(--tier2); color: #000; }
  .tag.tier3 { background: var(--tier3); color: #fff; }
  .tag.differentiate { background: var(--accent-d); color: #fff; }
  .tag.integrate { background: var(--accent-i); color: #000; }
  .tag.recurse { background: var(--accent-r); color: #fff; }

  .detail-section { margin-bottom: 14px; }
  .detail-section h3 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .detail-section p { font-size: 12px; line-height: 1.5; }

  .conf-bar { width: 100%; height: 5px; background: var(--surface2); border-radius: 3px; margin-top: 3px; overflow: hidden; }
  .conf-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

  .domain-list { list-style: none; }
  .domain-list li { font-size: 11px; padding: 2px 0; display: flex; align-items: center; gap: 5px; }
  .src-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  .rel-item {
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    cursor: pointer;
  }
  .rel-item:hover { color: #fff; }
  .rel-type { font-size: 9px; text-transform: uppercase; letter-spacing: 0.4px; margin-left: 3px; }

  /* ── GAPS PANEL ── */
  .gap-card {
    padding: 8px 10px;
    margin-bottom: 6px;
    border-radius: 4px;
    font-size: 11px;
    line-height: 1.4;
    border-left: 3px solid;
    background: var(--surface2);
  }
  .gap-card.critical { border-color: var(--gap-critical); }
  .gap-card.high { border-color: var(--gap-high); }
  .gap-card.medium { border-color: var(--gap-medium); }
  .gap-card.low { border-color: var(--gap-low); }

  .gap-card .gap-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }

  .gap-section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin: 12px 0 6px;
    padding-bottom: 3px;
    border-bottom: 1px solid var(--border);
  }

  .gap-count {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 8px;
    font-size: 9px;
    font-weight: 700;
    background: var(--gap-critical);
    color: #fff;
    margin-left: 4px;
  }

  /* ── GRAPH ── */
  svg.graph { width: 100%; height: 100%; display: block; }
  .node circle { stroke-width: 2; cursor: pointer; }
  .node:hover circle { filter: brightness(1.3); }
  .node text { font-size: 9px; fill: var(--text); pointer-events: none; text-anchor: middle; }
  .link { fill: none; stroke-opacity: 0.3; stroke-width: 1.5; }
  .link.complement { stroke: var(--complement); }
  .link.tension { stroke: var(--tension); stroke-dasharray: 6 3; }
  .link.composition { stroke: var(--composition); }
  .link.specialisation { stroke: var(--composition); stroke-dasharray: 2 2; }
  .link.instance-of { stroke: var(--composition); stroke-dasharray: 8 4; }
  .link.highlighted { stroke-opacity: 0.9; stroke-width: 3; }
  .node.dimmed circle { opacity: 0.12; }
  .node.dimmed text { opacity: 0.12; }
  .link.dimmed { stroke-opacity: 0.04; }

  /* ── LEGEND ── */
  .legend {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: rgba(18,18,26,0.94);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px 12px;
    font-size: 10px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    z-index: 10;
    pointer-events: none;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; color: var(--text-dim); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .legend-line { width: 16px; height: 2px; }
  .legend-line.dashed { background: repeating-linear-gradient(90deg, var(--tension) 0, var(--tension) 4px, transparent 4px, transparent 7px); }

  /* ── VOID MARKERS ── */
  .void-marker {
    fill: var(--gap-void);
    stroke: var(--gap-critical);
    stroke-width: 1;
    stroke-dasharray: 4 2;
    cursor: help;
  }
  .void-label {
    font-size: 9px;
    fill: var(--gap-critical);
    text-anchor: middle;
    opacity: 0.7;
    pointer-events: none;
  }

  /* ── HEATMAP ── */
  .heatmap-cell { cursor: pointer; transition: opacity 0.15s; }
  .heatmap-cell:hover { opacity: 0.8; stroke: #fff; stroke-width: 1; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .placeholder { color: var(--text-dim); font-size: 12px; text-align: center; padding: 30px 16px; line-height: 1.5; }
</style>
</head>
<body>

<div class="header">
  <h1><span class="live-dot" id="live-dot"></span>Motif Library</h1>
  <div class="stats-bar">
    <span><span class="sv" id="s-total">-</span>motifs</span>
    <span><span class="sv" id="s-t0">-</span>T0</span>
    <span><span class="sv" id="s-t1">-</span>T1</span>
    <span><span class="sv" id="s-t2">-</span>T2</span>
    <span><span class="sv" id="s-t3">-</span>T3</span>
    <span><span class="sv" id="s-domains">-</span>domains</span>
    <span><span class="sv" id="s-links">-</span>links</span>
    <span><span class="sv" id="s-tri">-</span>triangulated</span>
    <span id="s-updated" style="font-size:10px;color:var(--text-muted)"></span>
  </div>
</div>

<div class="controls">
  <label>Tier</label>
  <div class="btn-group" id="tier-filter">
    <button class="btn active" data-v="all">All</button>
    <button class="btn" data-v="0">T0</button>
    <button class="btn" data-v="1">T1</button>
    <button class="btn" data-v="2">T2</button>
    <button class="btn" data-v="3">T3</button>
  </div>

  <label style="margin-left:10px">Axis</label>
  <div class="btn-group" id="axis-filter">
    <button class="btn active" data-v="all">All</button>
    <button class="btn" data-v="differentiate" style="color:var(--accent-d)">D</button>
    <button class="btn" data-v="integrate" style="color:var(--accent-i)">I</button>
    <button class="btn" data-v="recurse" style="color:var(--accent-r)">R</button>
  </div>

  <label style="margin-left:10px">Source</label>
  <div class="btn-group" id="source-filter">
    <button class="btn active" data-v="all">All</button>
    <button class="btn" data-v="top-down">TD</button>
    <button class="btn" data-v="bottom-up">BU</button>
    <button class="btn" data-v="triangulated">Tri</button>
  </div>

  <label style="margin-left:10px">View</label>
  <div class="btn-group" id="view-toggle">
    <button class="btn active" data-v="graph">Network</button>
    <button class="btn" data-v="scatter">D/I/R</button>
    <button class="btn" data-v="heatmap">Domains</button>
    <button class="btn" data-v="timeline">Timeline</button>
  </div>

  <label class="gap-toggle" id="gap-toggle">
    <input type="checkbox" checked> Show gaps
  </label>
</div>

<div class="layout">
  <div class="main-panel" id="main-panel">
    <div class="legend" id="legend"></div>
  </div>
  <div class="side-panel">
    <div class="side-tabs">
      <div class="side-tab active" data-tab="detail">Detail</div>
      <div class="side-tab" data-tab="gaps">Gaps <span class="gap-count" id="gap-count">0</span></div>
    </div>
    <div class="side-content" id="side-content">
      <div class="placeholder">Click a motif to inspect it.<br>Toggle to the Gaps tab for discovery targets.</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
let DATA = null;
let currentView = 'graph';
let filterTier = 'all';
let filterAxis = 'all';
let filterSource = 'all';
let showGaps = true;
let selectedMotif = null;
let sideTab = 'detail';
let simulation = null;

// ═══════════════════════════════════════════════════════════════════
// DATA FETCH + SSE
// ═══════════════════════════════════════════════════════════════════

async function fetchData() {
  const res = await fetch('/api/motifs');
  DATA = await res.json();
  updateStats();
  render();
  updateGapsPanel();
}

function connectSSE() {
  const es = new EventSource('/api/events');
  const dot = document.getElementById('live-dot');
  es.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'update') {
      dot.style.background = '#fbbf24';
      fetchData().then(() => {
        setTimeout(() => { dot.style.background = '#22c55e'; }, 600);
      });
    }
  };
  es.onerror = () => { dot.style.background = '#ef4444'; };
}

function updateStats() {
  if (!DATA) return;
  const s = DATA.stats;
  document.getElementById('s-total').textContent = s.total;
  document.getElementById('s-t0').textContent = s.tiers[0] || 0;
  document.getElementById('s-t1').textContent = s.tiers[1] || 0;
  document.getElementById('s-t2').textContent = s.tiers[2] || 0;
  document.getElementById('s-t3').textContent = s.tiers[3] || 0;
  document.getElementById('s-domains').textContent = s.domains;
  document.getElementById('s-links').textContent = s.relationships;
  document.getElementById('s-tri').textContent = s.triangulated;
  const d = new Date(DATA.lastUpdated);
  document.getElementById('s-updated').textContent = `${d.toLocaleTimeString()}`;

  const gapTotal = (DATA.gaps.axisOrderVoids?.filter(g => g.severity !== 'low').length || 0)
    + (DATA.gaps.triangulationGaps?.length || 0)
    + (DATA.gaps.tierCandidates?.length || 0)
    + (DATA.gaps.topologyIsolates?.length || 0);
  document.getElementById('gap-count').textContent = gapTotal;
}

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════

const tierColorHex = ['#555568','#6b8aff','#fbbf24','#f472b6'];
const axisColorMap = {differentiate:'#ff6b6b',integrate:'#4ecdc4',recurse:'#a78bfa'};
const sourceColorMap = {'top-down':'#ff9f43','bottom-up':'#54a0ff','triangulated':'#7c3aed'};
const relColorMap = {complement:'#4ecdc4',tension:'#ff6b6b',composition:'#a78bfa',specialisation:'#a78bfa','instance-of':'#a78bfa'};

function nodeRadius(m) { return 5 + (m.domain_count || 0) * 1.6 + (m.tier >= 2 ? 4 : 0); }
function dOrderNum(m) {
  const d = m.derivative_order;
  return typeof d === 'string' ? parseFloat(d) : Number(d);
}

function filteredMotifs() {
  if (!DATA) return [];
  return DATA.motifs.filter(m => {
    if (filterTier !== 'all' && m.tier !== parseInt(filterTier)) return false;
    if (filterAxis !== 'all' && m.primary_axis !== filterAxis) return false;
    if (filterSource !== 'all' && m.source !== filterSource) return false;
    return true;
  });
}

function deduplicateLinks(motifs) {
  const fNames = new Set(motifs.map(m => m.filename));
  const links = [];
  const seen = new Set();
  motifs.forEach(m => {
    m.relationships.forEach(r => {
      if (!fNames.has(r.related_motif)) return;
      const key = [m.filename, r.related_motif].sort().join('|') + '|' + r.type;
      if (seen.has(key)) return;
      seen.add(key);
      links.push({ source: m.filename, target: r.related_motif, type: r.type, desc: r.desc });
    });
  });
  return links;
}

// ═══════════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════════

function setupControls() {
  const wire = (groupId, setter) => {
    document.querySelectorAll(`#${groupId} .btn`).forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll(`#${groupId} .btn`).forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        setter(b.dataset.v);
        render();
      });
    });
  };
  wire('tier-filter', v => filterTier = v);
  wire('axis-filter', v => filterAxis = v);
  wire('source-filter', v => filterSource = v);
  wire('view-toggle', v => { currentView = v; });

  document.getElementById('gap-toggle').addEventListener('click', e => {
    if (e.target.tagName === 'INPUT') {
      showGaps = e.target.checked;
      e.currentTarget.classList.toggle('on', showGaps);
      render();
    }
  });
  document.getElementById('gap-toggle').classList.toggle('on', showGaps);

  document.querySelectorAll('.side-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.side-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      sideTab = tab.dataset.tab;
      if (sideTab === 'detail' && selectedMotif) showDetail(selectedMotif);
      else if (sideTab === 'gaps') showGapsTab();
      else document.getElementById('side-content').innerHTML = '<div class="placeholder">Click a motif to inspect it.</div>';
    });
  });
}

// ═══════════════════════════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════════════════════════

function showDetail(m) {
  selectedMotif = m;
  if (sideTab !== 'detail') {
    document.querySelectorAll('.side-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.side-tab[data-tab="detail"]').classList.add('active');
    sideTab = 'detail';
  }
  const panel = document.getElementById('side-content');
  const conf = Math.round(m.confidence * 100);
  const confCol = m.confidence >= 0.9 ? '#fbbf24' : m.confidence >= 0.4 ? '#6b8aff' : '#555568';

  panel.innerHTML = `
    <div class="detail-title">${m.name}</div>
    <div class="detail-meta">
      <span class="tag tier${m.tier}">Tier ${m.tier}</span>
      <span class="tag ${m.primary_axis}">${m.primary_axis}</span>
      <span style="font-size:10px;color:var(--text-dim)">d=${m.derivative_order} · ${m.source} · ${m.status}</span>
    </div>
    <div class="detail-section">
      <h3>Confidence ${conf}%</h3>
      <div class="conf-bar"><div class="conf-fill" style="width:${conf}%;background:${confCol}"></div></div>
    </div>
    ${m.formulation ? `<div class="detail-section"><h3>Formulation</h3><p style="font-style:italic;font-size:12px">${m.formulation}</p></div>` : ''}
    ${m.description ? `<div class="detail-section"><h3>Structural Description</h3><p style="font-size:12px">${m.description}</p></div>` : ''}
    <div class="detail-section">
      <h3>Instances (${m.instances.length})</h3>
      <ul class="domain-list">
        ${m.instances.map(i => `<li><span class="src-dot" style="background:${sourceColorMap[i.source]||'#888'}"></span>${i.domain}</li>`).join('')}
      </ul>
    </div>
    <div class="detail-section">
      <h3>Relationships (${m.relationships.length})</h3>
      ${m.relationships.map(r => {
        const target = DATA.motifs.find(t => t.filename === r.related_motif);
        return `<div class="rel-item" data-target="${r.related_motif}">
          <span style="color:${relColorMap[r.type]||'#888'}">●</span>
          ${target ? target.name : r.related_motif}
          <span class="rel-type" style="color:${relColorMap[r.type]||'#888'}">${r.type}</span>
          <div style="color:var(--text-dim);font-size:10px;margin-top:1px">${r.desc}</div>
        </div>`;
      }).join('')}
    </div>
  `;

  panel.querySelectorAll('.rel-item').forEach(el => {
    el.addEventListener('click', () => {
      const t = DATA.motifs.find(m => m.filename === el.dataset.target);
      if (t) showDetail(t);
    });
  });
}

// ═══════════════════════════════════════════════════════════════════
// GAPS PANEL
// ═══════════════════════════════════════════════════════════════════

function showGapsTab() {
  const panel = document.getElementById('side-content');
  if (!DATA || !DATA.gaps) {
    panel.innerHTML = '<div class="placeholder">No gap data yet.</div>';
    return;
  }
  const g = DATA.gaps;
  let html = '';

  // Axis/order voids
  const voids = (g.axisOrderVoids || []).filter(v => v.severity !== 'low');
  if (voids.length) {
    html += `<div class="gap-section-title">Axis × Order Voids (${voids.length})</div>`;
    voids.forEach(v => {
      html += `<div class="gap-card ${v.severity}"><div class="gap-label" style="color:${v.severity==='high'?'var(--gap-high)':'var(--gap-medium)'}">${v.severity}</div>${v.note}</div>`;
    });
  }

  // Tier candidates
  if (g.tierCandidates?.length) {
    html += `<div class="gap-section-title">Tier Promotion Candidates (${g.tierCandidates.length})</div>`;
    g.tierCandidates.forEach(c => {
      html += `<div class="gap-card ${c.severity}" style="cursor:pointer" data-motif="${c.filename}"><div class="gap-label" style="color:var(--gap-${c.severity})">${c.severity}</div>${c.note}</div>`;
    });
  }

  // Triangulation gaps
  if (g.triangulationGaps?.length) {
    html += `<div class="gap-section-title">Triangulation Gaps (${g.triangulationGaps.length})</div>`;
    g.triangulationGaps.forEach(t => {
      html += `<div class="gap-card ${t.severity}" style="cursor:pointer" data-motif="${t.filename}"><div class="gap-label" style="color:var(--gap-${t.severity})">${t.severity}</div>${t.note}</div>`;
    });
  }

  // Topology isolates
  if (g.topologyIsolates?.length) {
    html += `<div class="gap-section-title">Topology Isolates (${g.topologyIsolates.length})</div>`;
    g.topologyIsolates.forEach(i => {
      html += `<div class="gap-card ${i.severity}" style="cursor:pointer" data-motif="${i.filename}"><div class="gap-label" style="color:var(--gap-medium)">medium</div>${i.note}</div>`;
    });
  }

  // Distribution summary
  html += `<div class="gap-section-title">Distributions</div>`;
  html += `<div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">Axis: D=${g.axisImbalance?.differentiate||0} I=${g.axisImbalance?.integrate||0} R=${g.axisImbalance?.recurse||0}</div>`;
  html += `<div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">Order: d0=${g.orderDistribution?.[0]||0} d1=${g.orderDistribution?.[1]||0} d2=${g.orderDistribution?.[2]||0} d3=${g.orderDistribution?.[3]||0}</div>`;
  html += `<div style="font-size:11px;color:var(--text-dim)">Source: TD=${g.sourceDistribution?.['top-down']||0} BU=${g.sourceDistribution?.['bottom-up']||0} Tri=${g.sourceDistribution?.triangulated||0}</div>`;

  if (!html) html = '<div class="placeholder">No gaps detected.</div>';

  panel.innerHTML = html;

  // Wire click-to-detail on gap cards
  panel.querySelectorAll('[data-motif]').forEach(el => {
    el.addEventListener('click', () => {
      const m = DATA.motifs.find(m => m.filename === el.dataset.motif);
      if (m) { sideTab = 'detail'; showDetail(m); }
    });
  });
}

function updateGapsPanel() {
  if (sideTab === 'gaps') showGapsTab();
}

// ═══════════════════════════════════════════════════════════════════
// RENDER DISPATCH
// ═══════════════════════════════════════════════════════════════════

function render() {
  if (!DATA) return;
  const panel = document.getElementById('main-panel');
  const legend = document.getElementById('legend');
  if (simulation) { simulation.stop(); simulation = null; }
  panel.querySelectorAll('svg').forEach(el => el.remove());

  const views = { graph: renderGraph, scatter: renderScatter, heatmap: renderHeatmap, timeline: renderTimeline };
  (views[currentView] || renderGraph)(panel, legend);
}

// ═══════════════════════════════════════════════════════════════════
// GRAPH VIEW
// ═══════════════════════════════════════════════════════════════════

function renderGraph(container, legend) {
  const W = container.clientWidth, H = container.clientHeight;
  const fm = filteredMotifs();
  const links = deduplicateLinks(fm);
  const nodes = fm.map(m => ({ ...m, id: m.filename }));

  const svg = d3.select(container).append('svg').attr('class','graph').attr('width',W).attr('height',H);
  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.2,5]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom).call(zoom.transform, d3.zoomIdentity.translate(W/2, H/2).scale(0.8));

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(90).strength(0.4))
    .force('charge', d3.forceManyBody().strength(-280))
    .force('center', d3.forceCenter(0, 0))
    .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 8));

  const link = g.append('g').selectAll('line').data(links).join('line')
    .attr('class', d => `link ${d.type}`);

  const node = g.append('g').selectAll('g').data(nodes).join('g').attr('class','node');

  node.append('circle')
    .attr('r', d => nodeRadius(d))
    .attr('fill', d => tierColorHex[d.tier] || '#555')
    .attr('stroke', d => axisColorMap[d.primary_axis] || '#888')
    .on('click', (e, d) => { showDetail(d); highlightConnected(d, node, link, links); });

  node.append('text')
    .attr('dy', d => nodeRadius(d) + 11)
    .text(d => d.name.length > 20 ? d.name.slice(0,18) + '…' : d.name)
    .attr('font-size', d => d.tier >= 2 ? '10px' : '8px')
    .attr('font-weight', d => d.tier >= 2 ? '600' : '400');

  node.call(d3.drag()
    .on('start', (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on('end', (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
  );

  simulation.on('tick', () => {
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  svg.on('click', function(e) {
    if (e.target === this) {
      node.classed('dimmed', false);
      link.classed('dimmed', false).classed('highlighted', false);
    }
  });

  legend.innerHTML = `
    <div class="legend-item"><span class="legend-dot" style="background:var(--tier0)"></span>T0</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--tier1)"></span>T1</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--tier2)"></span>T2</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--tier3)"></span>T3</div>
    <div class="legend-item" style="margin-left:6px"><span class="legend-line" style="background:var(--complement)"></span>comp</div>
    <div class="legend-item"><span class="legend-line dashed"></span>tension</div>
    <div class="legend-item"><span class="legend-line" style="background:var(--composition)"></span>comp/spec</div>
    <div class="legend-item" style="font-size:9px;color:var(--text-muted)">Ring = D/I/R · Size = domains</div>
  `;
}

function highlightConnected(d, nodesSel, linksSel, links) {
  const connected = new Set([d.id]);
  links.forEach(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    if (s === d.id) connected.add(t);
    if (t === d.id) connected.add(s);
  });
  nodesSel.classed('dimmed', n => !connected.has(n.id));
  linksSel.classed('dimmed', l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return s !== d.id && t !== d.id;
  });
  linksSel.classed('highlighted', l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return s === d.id || t === d.id;
  });
}

// ═══════════════════════════════════════════════════════════════════
// SCATTER VIEW — D/I/R × Derivative Order (with gap voids)
// ═══════════════════════════════════════════════════════════════════

function renderScatter(container, legend) {
  const W = container.clientWidth, H = container.clientHeight;
  const margin = {top:50, right:30, bottom:60, left:70};
  const fm = filteredMotifs();

  const svg = d3.select(container).append('svg').attr('width',W).attr('height',H);

  const axisMap = {differentiate:0, integrate:1, recurse:2};
  const xScale = d3.scaleLinear().domain([-0.5, 2.5]).range([margin.left, W-margin.right]);
  const yScale = d3.scaleLinear().domain([-0.3, 3.5]).range([H-margin.bottom, margin.top]);

  // Grid
  svg.append('g').selectAll('line').data([0,1,2,3]).join('line')
    .attr('x1', margin.left).attr('x2', W-margin.right)
    .attr('y1', d => yScale(d)).attr('y2', d => yScale(d))
    .attr('stroke','var(--border)').attr('stroke-dasharray','2 4');

  // Gap voids — empty axis/order cells
  if (showGaps && DATA.gaps.axisOrderVoids) {
    const cellW = (W - margin.left - margin.right) / 3;
    const cellH = (H - margin.top - margin.bottom) / 4;
    DATA.gaps.axisOrderVoids.filter(v => v.severity !== 'low').forEach(v => {
      const ax = axisMap[v.axis];
      if (ax == null) return;
      const cx = xScale(ax);
      const cy = yScale(v.order);
      svg.append('rect')
        .attr('class','void-marker')
        .attr('x', cx - cellW * 0.35)
        .attr('y', cy - cellH * 0.35)
        .attr('width', cellW * 0.7)
        .attr('height', cellH * 0.7)
        .attr('rx', 4);
      svg.append('text')
        .attr('class','void-label')
        .attr('x', cx)
        .attr('y', cy + 3)
        .text('VOID');
    });
  }

  // Axis labels
  ['Differentiate','Integrate','Recurse'].forEach((label,i) => {
    svg.append('text').attr('x', xScale(i)).attr('y', H-margin.bottom+28)
      .attr('text-anchor','middle').attr('fill', axisColorMap[label.toLowerCase()])
      .attr('font-size','11px').attr('font-weight','600').text(label);
  });

  svg.append('text').attr('transform',`translate(${margin.left-40},${H/2}) rotate(-90)`)
    .attr('text-anchor','middle').attr('fill','var(--text-dim)').attr('font-size','11px').text('Derivative Order');

  [0,1,2,3].forEach(d => {
    svg.append('text').attr('x', margin.left-10).attr('y', yScale(d)+4)
      .attr('text-anchor','end').attr('fill','var(--text-dim)').attr('font-size','10px').text(`d${d}`);
  });

  // Jitter
  const jit = () => (Math.random()-0.5) * 26;

  const dots = svg.append('g').selectAll('g').data(fm).join('g')
    .attr('transform', d => {
      const ax = axisMap[d.primary_axis] || 0;
      return `translate(${xScale(ax)+jit()},${yScale(dOrderNum(d))+jit()})`;
    })
    .style('cursor','pointer')
    .on('click', (e,d) => showDetail(d));

  dots.append('circle')
    .attr('r', d => 4 + d.confidence * 14)
    .attr('fill', d => tierColorHex[d.tier])
    .attr('stroke', d => axisColorMap[d.primary_axis])
    .attr('stroke-width', 2)
    .attr('opacity', 0.85);

  dots.append('text')
    .attr('dy', d => -(7 + d.confidence * 14))
    .attr('text-anchor','middle')
    .attr('fill','var(--text)')
    .attr('font-size', d => d.tier >= 2 ? '9px' : '7px')
    .text(d => d.name.length > 20 ? d.name.slice(0,18) + '…' : d.name);

  legend.innerHTML = `
    <div class="legend-item"><span class="legend-dot" style="background:var(--tier0)"></span>T0</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--tier1)"></span>T1</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--tier2)"></span>T2</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--tier3)"></span>T3</div>
    ${showGaps ? '<div class="legend-item" style="margin-left:6px"><span class="legend-dot" style="background:var(--gap-void);border:1px dashed var(--gap-critical)"></span>void</div>' : ''}
    <div class="legend-item" style="font-size:9px;color:var(--text-muted)">Size = confidence · Red dashed = discovery target</div>
  `;
}

// ═══════════════════════════════════════════════════════════════════
// HEATMAP VIEW — Motifs × Domains
// ═══════════════════════════════════════════════════════════════════

function renderHeatmap(container, legend) {
  const W = container.clientWidth, H = container.clientHeight;
  const fm = filteredMotifs().filter(m => m.instances.length > 0);
  // Sort: Tier 2 first, then by domain count
  fm.sort((a,b) => b.tier - a.tier || b.domain_count - a.domain_count);
  const domains = [...new Set(fm.flatMap(m => m.instances.map(i => i.domain)))].sort();

  const margin = {top:140, right:16, bottom:16, left:260};
  const cellW = Math.max(14, Math.min(26, (W - margin.left - margin.right) / domains.length));
  const cellH = Math.max(12, Math.min(20, (H - margin.top - margin.bottom) / fm.length));

  const svgW = Math.max(W, margin.left + domains.length * cellW + margin.right);
  const svgH = Math.max(H, margin.top + fm.length * cellH + margin.bottom);

  const svg = d3.select(container).append('svg').attr('width', svgW).attr('height', svgH);

  // Domain labels
  svg.append('g').selectAll('text').data(domains).join('text')
    .attr('x', (d,i) => margin.left + i * cellW + cellW/2)
    .attr('y', margin.top - 6)
    .attr('text-anchor','end')
    .attr('transform', (d,i) => `rotate(-55,${margin.left + i * cellW + cellW/2},${margin.top - 6})`)
    .attr('fill','var(--text-dim)')
    .attr('font-size','8px')
    .text(d => d.length > 28 ? d.slice(0,26) + '…' : d);

  // Motif labels
  svg.append('g').selectAll('text').data(fm).join('text')
    .attr('x', margin.left - 6)
    .attr('y', (d,i) => margin.top + i * cellH + cellH/2 + 3)
    .attr('text-anchor','end')
    .attr('fill', d => tierColorHex[d.tier])
    .attr('font-size','9px')
    .attr('font-weight', d => d.tier >= 2 ? '600' : '400')
    .text(d => d.name.length > 32 ? d.name.slice(0,30) + '…' : d.name);

  // Cells
  fm.forEach((m, mi) => {
    const domSet = {};
    m.instances.forEach(inst => { domSet[inst.domain] = inst.source; });
    domains.forEach((dom, di) => {
      if (domSet[dom]) {
        svg.append('rect')
          .attr('class','heatmap-cell')
          .attr('x', margin.left + di * cellW + 1)
          .attr('y', margin.top + mi * cellH + 1)
          .attr('width', cellW - 2)
          .attr('height', cellH - 2)
          .attr('rx', 2)
          .attr('fill', sourceColorMap[domSet[dom]] || '#888')
          .attr('opacity', 0.85)
          .on('click', () => showDetail(m));
      }
    });
  });

  // Gap highlighting: sparse domain columns
  if (showGaps && DATA.gaps.domainCoverage) {
    const sparseDomains = new Set(DATA.gaps.domainCoverage.map(g => g.domain));
    domains.forEach((dom, di) => {
      if (sparseDomains.has(dom)) {
        svg.append('rect')
          .attr('x', margin.left + di * cellW)
          .attr('y', margin.top - 2)
          .attr('width', cellW)
          .attr('height', fm.length * cellH + 4)
          .attr('fill', 'none')
          .attr('stroke', 'var(--gap-critical)')
          .attr('stroke-width', 1)
          .attr('stroke-dasharray', '3 2')
          .attr('opacity', 0.5);
      }
    });
  }

  legend.innerHTML = `
    <div class="legend-item"><span class="legend-dot" style="background:var(--source-td)"></span>top-down</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--source-bu)"></span>bottom-up</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--source-tri)"></span>triangulated</div>
    ${showGaps ? '<div class="legend-item" style="margin-left:6px;font-size:9px;color:var(--gap-critical)">Red dashed = single-motif domain</div>' : ''}
  `;
}

// ═══════════════════════════════════════════════════════════════════
// TIMELINE VIEW
// ═══════════════════════════════════════════════════════════════════

function renderTimeline(container, legend) {
  const W = container.clientWidth, H = container.clientHeight;
  const margin = {top:40, right:30, bottom:60, left:40};
  const fm = filteredMotifs().filter(m => m.created);

  const dates = fm.map(m => new Date(m.created));
  const minDate = d3.min(dates) || new Date();
  const maxDate = d3.max(dates) || new Date();
  const pad = 86400000 * 2;

  const xScale = d3.scaleTime().domain([new Date(minDate - pad), new Date(maxDate.getTime() + pad)]).range([margin.left, W-margin.right]);

  const svg = d3.select(container).append('svg').attr('width',W).attr('height',H);

  const xAxis = d3.axisBottom(xScale).ticks(6).tickFormat(d3.timeFormat('%b %d'));
  svg.append('g').attr('transform',`translate(0,${H-margin.bottom})`).call(xAxis)
    .selectAll('text').attr('fill','var(--text-dim)').attr('font-size','10px');
  svg.selectAll('.domain, .tick line').attr('stroke','var(--border)');

  // Group by date
  const byDate = {};
  fm.forEach(m => { const d = m.created; if (!byDate[d]) byDate[d] = []; byDate[d].push(m); });

  Object.entries(byDate).forEach(([date, ms]) => {
    ms.sort((a,b) => b.tier - a.tier || b.confidence - a.confidence);
    ms.forEach((m, i) => {
      const cx = xScale(new Date(date));
      const cy = H - margin.bottom - 36 - i * 30;
      const r = 4 + (m.domain_count || 0) * 1.1;

      const g = svg.append('g').attr('transform', `translate(${cx},${cy})`).style('cursor','pointer')
        .on('click', () => showDetail(m));

      // Gap: highlight tier-suppressed motifs
      if (showGaps && DATA.gaps.tierCandidates?.some(c => c.filename === m.filename && c.severity === 'critical')) {
        g.append('circle').attr('r', r + 5).attr('fill','none').attr('stroke','var(--gap-critical)').attr('stroke-width',1.5).attr('stroke-dasharray','3 2');
      }

      g.append('circle').attr('r', r)
        .attr('fill', tierColorHex[m.tier]).attr('stroke', axisColorMap[m.primary_axis]).attr('stroke-width',2).attr('opacity',0.9);

      // Promoted marker
      if (m.promoted) {
        g.append('circle').attr('r', 2).attr('cx', r + 4).attr('cy', -r).attr('fill','var(--tier2)');
      }

      if (ms.length <= 10 || m.tier >= 1) {
        g.append('text').attr('dx', r + 5).attr('dy', 3).attr('fill','var(--text)').attr('font-size', m.tier >= 2 ? '9px' : '7px')
          .text(m.name.length > 22 ? m.name.slice(0,20) + '…' : m.name);
      }
    });
  });

  legend.innerHTML = `
    <div class="legend-item"><span class="legend-dot" style="background:var(--tier0)"></span>T0</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--tier1)"></span>T1</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--tier2)"></span>T2</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--tier3)"></span>T3</div>
    ${showGaps ? '<div class="legend-item" style="margin-left:6px;font-size:9px;color:var(--gap-critical)">Red ring = tier-suppressed</div>' : ''}
    <div class="legend-item" style="font-size:9px;color:var(--text-muted)">Size = domains · Position = created date</div>
  `;
}

// ═══════════════════════════════════════════════════════════════════

setupControls();
fetchData();
connectSSE();
window.addEventListener('resize', () => { clearTimeout(window._rt); window._rt = setTimeout(render, 200); });
